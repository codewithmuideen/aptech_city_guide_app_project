<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42A5F5"/>
      <stop offset="1" stop-color="#1565C0"/>
    </linearGradient>
    <linearGradient id="skyline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#E3F2FD"/>
    </linearGradient>
    <linearGradient id="pin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF7043"/>
      <stop offset="1" stop-color="#E64A19"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect x="0" y="0" width="512" height="512" rx="110" ry="110" fill="url(#bg)"/>

  <!-- Soft highlight -->
  <circle cx="140" cy="130" r="120" fill="#FFFFFF" opacity="0.08"/>

  <!-- Skyline buildings -->
  <g fill="url(#skyline)">
    <rect x="96"  y="300" width="52" height="120" rx="6"/>
    <rect x="156" y="250" width="46" height="170" rx="6"/>
    <rect x="210" y="220" width="58" height="200" rx="6"/>
    <rect x="276" y="260" width="46" height="160" rx="6"/>
    <rect x="330" y="230" width="54" height="190" rx="6"/>
    <rect x="392" y="290" width="32" height="130" rx="6"/>
  </g>

  <!-- Windows -->
  <g fill="#1565C0" opacity="0.45">
    <rect x="108" y="320" width="10" height="14"/>
    <rect x="126" y="320" width="10" height="14"/>
    <rect x="108" y="345" width="10" height="14"/>
    <rect x="126" y="345" width="10" height="14"/>
    <rect x="166" y="275" width="10" height="14"/>
    <rect x="184" y="275" width="10" height="14"/>
    <rect x="166" y="300" width="10" height="14"/>
    <rect x="184" y="300" width="10" height="14"/>
    <rect x="222" y="250" width="10" height="14"/>
    <rect x="240" y="250" width="10" height="14"/>
    <rect x="222" y="280" width="10" height="14"/>
    <rect x="240" y="280" width="10" height="14"/>
    <rect x="222" y="310" width="10" height="14"/>
    <rect x="240" y="310" width="10" height="14"/>
    <rect x="286" y="285" width="10" height="14"/>
    <rect x="302" y="285" width="10" height="14"/>
    <rect x="342" y="260" width="10" height="14"/>
    <rect x="360" y="260" width="10" height="14"/>
    <rect x="342" y="290" width="10" height="14"/>
    <rect x="360" y="290" width="10" height="14"/>
  </g>

  <!-- Ground line -->
  <rect x="72" y="420" width="368" height="10" rx="5" fill="#FFFFFF" opacity="0.6"/>

  <!-- Location pin -->
  <g>
    <path d="M256 80
             C 312 80 352 122 352 176
             C 352 238 280 300 258 316
             C 256 318 254 318 252 316
             C 232 300 160 238 160 176
             C 160 122 200 80 256 80 Z"
          fill="url(#pin)" stroke="#FFFFFF" stroke-width="8"/>
    <circle cx="256" cy="172" r="34" fill="#FFFFFF"/>
    <circle cx="256" cy="172" r="14" fill="#E64A19"/>
  </g>
</svg>

name: city_guide_app
description: A City Guide mobile application built with Flutter for discovering local attractions, restaurants, events and accommodations.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # State management
  provider: ^6.1.1

  # Local storage
  shared_preferences: ^2.2.2

  # UI / Utilities
  cached_network_image: ^3.3.0
  flutter_rating_bar: ^4.0.1
  carousel_slider: ^5.0.0
  flutter_staggered_grid_view: ^0.7.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  image_picker: ^1.0.7

  # External maps and web links
  url_launcher: ^6.2.1

  # Network (optional / for future API)
  http: ^1.1.0

  # Security
  crypto: ^3.0.3

  # Intl and date formatting
  intl: ^0.18.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icons/app_logo.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/icons/app_logo.png"
    background_color: "#1E88E5"
    theme_color: "#1E88E5"
  windows:
    generate: true
    image_path: "assets/icons/app_logo.png"
    icon_size: 48

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
